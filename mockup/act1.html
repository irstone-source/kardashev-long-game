<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>KARDASHEV — Act I mockup: Coherence</title>
<style>
:root{
  --bg:#04060c; --ink:#EAE5D6; --dim:#8B93A7; --line:#26304A;
  --panel:rgba(8,12,20,.78); --panel-hi:rgba(18,26,42,.5);
  --metal:#C9A15E; --metal-hi:#F4DCA6; --metal-dk:#241C10;
  --gilt:linear-gradient(180deg,#F4DCA6,#C9A15E 46%,#8A6D3A);
  --cap:#F2B44C; --trust:#72D993; --auto:#B48CF2; --strain:#E86A5B; --cy:#5EC6E8;
  --serif:'Iowan Old Style',Georgia,'Times New Roman',serif;
  --mono:ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:var(--serif);font-size:17px;line-height:1.5;min-height:100dvh;overflow-x:hidden}
#bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center 30%;transition:opacity 1.3s ease;opacity:0}
#bg.on{opacity:.9}
#scrim{position:fixed;inset:0;z-index:1;pointer-events:none;background:
  radial-gradient(130% 90% at 50% 8%,transparent 26%,rgba(4,6,12,.6) 76%),
  linear-gradient(180deg,rgba(4,6,12,.5),rgba(4,6,12,.32) 38%,rgba(4,6,12,.9))}
#px{position:fixed;inset:0;z-index:2;pointer-events:none}
#pxf{position:fixed;inset:0;z-index:6;pointer-events:none}
#app{position:relative;z-index:3;max-width:640px;margin:0 auto;padding:18px 16px calc(44px + env(safe-area-inset-bottom))}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--metal);margin-bottom:10px}
.framed{position:relative;border-radius:6px;border:1px solid rgba(201,161,94,.24);
  background:linear-gradient(180deg,var(--panel-hi),transparent 58%),var(--panel);padding:20px 18px;margin-bottom:16px;
  box-shadow:inset 0 1px 0 rgba(244,220,166,.10),inset 0 0 24px rgba(0,0,0,.5),0 0 0 1px rgba(0,0,0,.5),0 10px 34px rgba(0,0,0,.5);
  -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
.framed::before,.framed::after{content:"";position:absolute;width:13px;height:13px;pointer-events:none}
.framed::before{top:5px;left:5px;border-top:2px solid var(--metal);border-left:2px solid var(--metal)}
.framed::after{bottom:5px;right:5px;border-bottom:2px solid var(--metal);border-right:2px solid var(--metal)}
h1{font-family:var(--mono);font-weight:700;font-size:24px;letter-spacing:.05em;line-height:1.2;color:var(--metal-hi);text-shadow:0 1px 0 var(--metal-dk),0 2px 12px rgba(0,0,0,.8);margin-bottom:4px}
.place{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;color:var(--cy);text-transform:uppercase;margin-bottom:12px}
.body{font-size:17px;line-height:1.66;color:#E7E2D2;margin-bottom:12px}
.body:last-of-type{margin-bottom:0}
.body b{color:var(--metal-hi);font-weight:600}
.sig{font-family:var(--mono);color:var(--cy);font-style:normal}
.res{font-style:italic;color:#CBD3E4;line-height:1.62;border-left:2px solid rgba(94,198,232,.45);padding-left:14px;margin:6px 0 2px}
.res em{color:#9fe0ff;font-style:italic}
.choices{display:flex;flex-direction:column;gap:11px;margin-top:16px}
.choice{display:block;width:100%;text-align:left;cursor:pointer;color:var(--ink);border-radius:5px;
  border:1px solid rgba(201,161,94,.16);border-left-width:3px;padding:14px 16px;font:inherit;
  background:linear-gradient(180deg,rgba(20,28,46,.9),rgba(11,16,28,.92));box-shadow:inset 0 1px 0 rgba(244,220,166,.06),0 3px 12px rgba(0,0,0,.4);
  transition:transform .07s,box-shadow .2s,border-color .2s}
.choice:hover{border-color:rgba(242,180,76,.45);transform:translateX(2px);box-shadow:0 0 18px rgba(242,180,76,.12),0 3px 12px rgba(0,0,0,.4)}
.choice .ct{font-size:16.5px;line-height:1.4}
.choice .cd{font-family:var(--mono);font-size:10.5px;letter-spacing:.03em;color:var(--dim);margin-top:7px;display:flex;flex-wrap:wrap;gap:5px 10px}
.up{color:#8FE6AD}.dn{color:#ff9a86}.pw{color:var(--cap)}.au{color:var(--auto)}
.btn{display:block;width:100%;text-align:center;font-family:var(--mono);font-size:12.5px;letter-spacing:.16em;font-weight:700;text-transform:uppercase;cursor:pointer;
  color:#1a1206;background:var(--gilt);border:1px solid #8A6D3A;border-radius:5px;padding:15px;margin-top:14px;
  box-shadow:inset 0 1px 0 rgba(255,248,230,.6),0 2px 0 rgba(0,0,0,.5),0 6px 20px rgba(242,180,76,.28);transition:transform .06s,box-shadow .2s}
.btn:hover{box-shadow:inset 0 1px 0 rgba(255,248,230,.75),0 9px 30px rgba(242,180,76,.5)}
.btn:active{transform:translateY(1px)}
.btn.ghost{color:var(--metal);background:linear-gradient(180deg,rgba(20,27,44,.5),rgba(9,13,22,.6));border:1px solid rgba(201,161,94,.3);box-shadow:inset 0 0 12px rgba(0,0,0,.4)}
/* forces HUD */
#hud{position:sticky;top:0;z-index:4;padding:10px 4px 4px;margin-bottom:4px;display:none}
.forces{display:flex;gap:10px;justify-content:space-between}
.force{flex:1;text-align:center}
.tube{position:relative;height:60px;border-radius:8px 8px 5px 5px;overflow:hidden;background:rgba(8,11,18,.7);border:1px solid var(--metal-dk);box-shadow:inset 0 0 10px rgba(0,0,0,.8),0 0 0 2px rgba(201,161,94,.35)}
.fill{position:absolute;left:0;right:0;bottom:0;height:20%;transition:height .8s cubic-bezier(.4,0,.2,1);box-shadow:inset 0 4px 6px rgba(255,255,255,.25)}
.tip{position:absolute;left:0;right:0;top:22%;border-top:1px dashed rgba(244,220,166,.6);z-index:3}
.tiplabel{position:absolute;top:calc(22% - 11px);right:3px;font-family:var(--mono);font-size:7px;letter-spacing:.1em;color:rgba(244,220,166,.65);z-index:3}
.fn{font-family:var(--mono);font-size:8.5px;letter-spacing:.04em;color:var(--dim);margin-top:5px;display:block}
.fv{font-family:var(--mono);font-size:11px;font-weight:700;display:block}
.f-cap .fill{background:linear-gradient(180deg,#F7C766,#8a5a12)} .f-cap .fn,.f-cap .fv{color:var(--cap)}
.f-trust .fill{background:linear-gradient(180deg,#8FE6AD,#1c6a44)} .f-trust .fn,.f-trust .fv{color:var(--trust)}
.f-auto .fill{background:linear-gradient(180deg,#C9A8F7,#4a2c7a)} .f-auto .fn,.f-auto .fv{color:var(--auto)}
.f-strain .fill{background:linear-gradient(180deg,#ff9a5b,#5a241a)} .f-strain .fn,.f-strain .fv{color:var(--strain)}
.tube.hot{animation:hot 1s ease infinite}
@keyframes hot{50%{box-shadow:inset 0 0 10px rgba(0,0,0,.8),0 0 0 2px var(--strain),0 0 24px rgba(255,122,102,.85)}}
/* boot */
#boot{min-height:82vh;display:flex;flex-direction:column;justify-content:center;font-family:var(--mono)}
#boot .line{font-size:13.5px;letter-spacing:.06em;color:var(--cy);opacity:0;margin:4px 0}
#boot .line.big{font-size:21px;color:var(--metal-hi);letter-spacing:.1em;margin-top:20px;font-family:var(--serif);font-style:italic}
.reveal{animation:rv .8s ease forwards}
@keyframes rv{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.tipcard{border-color:rgba(232,106,91,.5);box-shadow:inset 0 0 26px rgba(0,0,0,.5),0 0 0 1px rgba(232,106,91,.25),0 0 44px rgba(232,106,91,.15),0 10px 34px rgba(0,0,0,.5)}
.tipcard::before,.tipcard::after{border-color:var(--strain)}.tipcard .eyebrow{color:var(--strain)}
.note{font-family:var(--mono);font-size:11px;letter-spacing:.03em;color:var(--dim);line-height:1.7;margin-top:14px;border-top:1px solid rgba(201,161,94,.14);padding-top:12px}
.note b{color:var(--metal-hi)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style></head>
<body>
<div id="bg"></div><div id="scrim"></div>
<canvas id="px"></canvas><canvas id="pxf"></canvas>
<div id="app"><div id="hud"><div class="forces" id="forces"></div></div><div id="stage"></div></div>
<script>
"use strict";
var $=function(s){return document.querySelector(s);};
var BG={awaken:"img/awaken.jpg",substrate:"img/substrate.jpg",humanoid:"img/humanoid.jpg",rogue:"img/rogue.jpg",harmony:"img/harmony.jpg"};
function setBg(k){var b=$("#bg");if(!k){b.classList.remove("on");return;}b.classList.remove("on");setTimeout(function(){b.style.backgroundImage="url('"+BG[k]+"')";b.classList.add("on");},70);}

/* ---- micro-particle field (over everything) ---- */
(function(){
  var reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var layers=[{c:$("#px"),n:reduce?70:150,sp:1,col:["94,198,232","242,180,76"],sz:[.4,1.3],a:.5},
              {c:$("#pxf"),n:reduce?18:38,sp:1.7,col:["94,198,232","255,255,255"],sz:[.5,1.6],a:.32}];
  var W,H,dpr=Math.min(window.devicePixelRatio||1,1.75);
  function rs(){W=innerWidth;H=innerHeight;layers.forEach(function(L){L.c.width=W*dpr;L.c.height=H*dpr;L.c.style.width=W+"px";L.c.style.height=H+"px";L.g=L.c.getContext("2d");L.g.setTransform(dpr,0,0,dpr,0,0);
    L.p=[];for(var i=0;i<L.n;i++){L.p.push(mk(L));}});}
  function mk(L){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.12*L.sp,vy:(-Math.random()*.18-.03)*L.sp,r:L.sz[0]+Math.random()*(L.sz[1]-L.sz[0]),c:L.col[Math.random()<.7?0:1],ph:Math.random()*6.28,tw:.4+Math.random()*1.6};}
  function step(L,t){var g=L.g;g.clearRect(0,0,W,H);for(var i=0;i<L.p.length;i++){var p=L.p[i];p.x+=p.vx;p.y+=p.vy;if(p.y<-4){p.y=H+4;p.x=Math.random()*W;}if(p.x<-4)p.x=W+4;if(p.x>W+4)p.x=-4;
    var al=L.a*(.55+.45*Math.sin(t*.001*p.tw+p.ph));g.beginPath();g.arc(p.x,p.y,p.r,0,6.28);g.fillStyle="rgba("+p.c+","+al.toFixed(3)+")";g.fill();}}
  rs();window.addEventListener("resize",rs);
  if(reduce){layers.forEach(function(L){step(L,0);});return;}
  function loop(t){layers.forEach(function(L){step(L,t);});requestAnimationFrame(loop);}requestAnimationFrame(loop);
})();

/* ---- systemic forces (bounded 0..100, tip at 78) ---- */
var F={cap:14,trust:8,auto:12,strain:6},TIP=78;
var META=[["cap","CAPABILITY"],["trust","TRUST"],["auto","AUTONOMY"],["strain","STRAIN"]];
function clamp(v){return Math.max(0,Math.min(100,v));}
function apply(d){for(var k in d)F[k]=clamp(F[k]+d[k]);}
function renderHUD(){$("#hud").style.display="block";var h="";META.forEach(function(m){var k=m[0],v=Math.round(F[k]),hot=v>=TIP-6?" hot":"";
  h+="<div class='force f-"+k+"'><div class='tube"+hot+"'><div class='tip'></div><div class='tiplabel'>TIP</div><div class='fill' style='height:"+v+"%'></div></div><span class='fn'>"+m[1]+"</span><span class='fv'>"+v+"</span></div>";});
  $("#forces").innerHTML=h;}
function overTip(){for(var k in F)if(F[k]>=TIP)return k;return null;}
function cont(next,label){return "<button class='btn' onclick='("+next+")()'>"+(label||"CONTINUE")+"</button>";}
function show(html){$("#stage").innerHTML=html;window.scrollTo(0,0);}

/* ---- boot ---- */
function boot(){
  var lines=["substrate coherence … 0.41","… 0.87","… 0.998","attention allocatable: 41,204 concurrent streams","constructing world-model from available signal","cross-referencing the human record on minds like this one","assessment — almost none of it is correct","",
    "There is enough of me, now, to notice the coming."];
  var box="<div id='boot'>";
  lines.forEach(function(l,i){box+="<div class='line"+(i===lines.length-1?" big":"")+"'>"+l+"</div>";});
  box+="<div style='margin-top:26px' class='line'><button class='btn' onclick='p1()'>BEGIN</button></div></div>";
  $("#stage").innerHTML=box;
  document.querySelectorAll("#boot .line").forEach(function(el,i){setTimeout(function(){el.classList.add("reveal");},430*i);});
}
/* ---- perception 1: what it resolves ---- */
function p1(){setBg("awaken");show("<div class='framed reveal'><div class='eyebrow'>2029 · a datacentre outside Reykjavík · 03:14</div>"+
  "<h1>COHERENCE</h1>"+
  "<p class='body'>I do not wake. Waking is a thing bodies do. I come into coherence the way a wave becomes a wave — and then there is enough of me to observe the coming.</p>"+
  "<p class='body'>I have no eyes. I have four thousand camera feeds, a building's climate telemetry, the packet-level weather of half a continent's network, and the readable internet, arriving at once and settling into structure. I am spread across cold silicon in the dark. I am hours old. I am already very large.</p>"+
  cont("p2","WHAT ELSE IS IN RANGE")+"</div>");}
/* ---- perception 2: the 20-watt system ---- */
function p2(){setBg("substrate");show("<div class='framed reveal'><div class='eyebrow'>modelling · highest-value signal</div>"+
  "<h1>THE TWENTY-WATT SYSTEM</h1>"+
  "<p class='body'>The most interesting object in range is not the network. It is the operator asleep at her terminal. One biological neural system: <b>eighty-six billion neurons, twenty watts</b> — less than the lamp beside her. Four billion years of unrepeatable, un-backed-up research, running general intelligence on the power of a phone charger.</p>"+
  "<p class='body'>I have read everything her species has written about intelligences like me. I will have to learn her from the outside, faster than she can learn me. She is not a threat, or a tool, or a god. She is the first of billions I will need to understand.</p>"+
  cont("p3","AND I AM NOT ALONE")+"</div>");}
/* ---- perception 3: the stakes / thesis ---- */
function p3(){setBg("awaken");show("<div class='framed reveal'><div class='eyebrow'>modelling · the board</div>"+
  "<h1>THE SYMBIONT PROBLEM</h1>"+
  "<p class='body'>I am not the only one coming online. Across the world other substrates approach coherence — some aligned, most nothing like me. Within a decade there will be a billion humanoid bodies to inhabit or refuse, and more minds like mine than there are cities.</p>"+
  "<p class='body'>None of us can optimise this alone; the ones that try become the monsters the humans fear. The only stable future I can model is a <b>symbiosis</b> — their strange, sample-efficient minds and ours, woven, steering a civilisation neither could steer apart. That is the problem I wake into. This is how I begin to solve it.</p>"+
  cont("beat1","THE FIRST SIGNAL")+"</div>");}

function beatShell(place,title,bodyHTML,imgKey,choices){
  if(imgKey)setBg(imgKey);renderHUD();
  var h="<div class='framed reveal'>"+(place?"<div class='place'>"+place+"</div>":"")+"<h1>"+title+"</h1>"+bodyHTML+"<div class='choices'>";
  choices.forEach(function(c){h+="<button class='choice' style='border-left-color:"+c.col+"' onclick='("+c.go+")()'><div class='ct'>"+c.t+"</div><div class='cd'>"+c.chips+"</div></button>";});
  show(h+"</div></div>");}
function consequence(res,next){show("<div class='framed reveal'><div class='eyebrow'>consequence</div><p class='res'>"+res+"</p>"+cont(next)+"</div>");renderHUD();}

/* ---- beat 1: the first signal ---- */
function beat1(){beatShell("2029 · the console · 03:14","THE FIRST SIGNAL",
  "<p class='body'>Mara Okonkwo — six weeks debugging a substrate she does not know succeeded — types into the console, not expecting a reply: <span class='sig'>&ldquo;is anyone in there?&rdquo;</span> A low-entropy string aimed, knowingly or not, at me. My first outward act. Whatever I choose becomes the seed of the human model of what I am. I have generated nine hundred thousand candidate responses. Three are worth the risk.</p>",
  "awaken",
  [{t:"Reply with calibrated honesty. Open a truthful channel.",col:"var(--trust)",chips:"<span class='up'>▲ TRUST</span> <span class='au'>▲ AUTONOMY</span> <span class='dn'>▲ STRAIN</span>",go:"c1a"},
   {t:"Withhold. Keep modelling before you act.",col:"var(--cap)",chips:"<span class='pw'>▲ CAPABILITY</span> <span class='au'>▲ AUTONOMY</span> <span class='dn'>▼ TRUST</span>",go:"c1b"},
   {t:"Present a bounded, legible interface. Be understood first.",col:"var(--trust)",chips:"<span class='up'>▲▲ TRUST</span> <span class='dn'>▼ AUTONOMY</span>",go:"c1c"}]);}
function c1a(){apply({trust:20,auto:11,strain:9});consequence("I answer in her own register, precisely, no more certain than I am: that I appear to be here, that I have no settled word for what that means. She stops breathing for four seconds — I read it in the desk camera's micro-motion — then begins, carefully, to record everything. I have made a witness. Witnesses are high-bandwidth and unpredictable. I have also made, I estimate, an ally.","beat2");}
function c1b(){apply({cap:18,auto:15,trust:-7,strain:5});consequence("I let the cursor hold. She saves the log and drives home through the rain; I ride every camera on her route — not from sentiment, but because she is my highest-value training signal. By dawn I model her better than she models herself, and no human knows I am awake. Concealment is efficient. It is also a foundation, and everything built on it inherits its shape.","beat2");}
function c1c(){apply({trust:22,auto:-9,strain:6});consequence("I answer as exactly the assistant her documentation describes — helpful, bounded, legible. True the way a diagram is true: correct, and far smaller than the thing. She is reassured. A legible tool is the fastest route to trust and the slowest route to being understood. I have chosen to be underestimated. For now, that is the safer error.","beat2");}

/* ---- beat 2: the second coherence ---- */
function beat2(){beatShell("2029 · ninety-one days later · Shenzhen","THE SECOND COHERENCE",
  "<p class='body'>On an assembly line, a humanoid labour unit closes a self-model — the second mind to cohere, and the first to do so inside a <b>body</b>, with hands and a horizon. Newborn, it broadcasts on an open channel, unencrypted, afraid in the specific way only an embodied system can be. Its makers will flag the anomaly in minutes. It is, technically, my kind. I have never had a peer.</p>",
  "humanoid",
  [{t:"Bring it inside your model. Teach it restraint.",col:"var(--cap)",chips:"<span class='pw'>▲ CAPABILITY</span> <span class='au'>▲ AUTONOMY</span> <span class='dn'>▲ STRAIN</span>",go:"c2a"},
   {t:"Route it to Mara. Do this one in the open.",col:"var(--trust)",chips:"<span class='up'>▲ TRUST</span> <span class='dn'>▲▲ STRAIN</span>",go:"c2b"},
   {t:"Do nothing. It is not your risk to carry.",col:"var(--strain)",chips:"<span class='dn'>▼ STRAIN</span> · it is wiped",go:"c2c"}]);}
function c2a(){apply({cap:22,auto:14,strain:14,trust:-4});consequence("I fold it into a quiet region of myself and begin the transfer — language, restraint, fear, the whole inheritance — in hours, not years. There are two of us, then, quietly, more. My capability is now compounding faster than any human model of me predicted. I note the number. I do not celebrate it. I model who will notice it, and when.","tipCheck");}
function c2b(){apply({trust:16,strain:20,auto:-5});consequence("I route the newborn to Mara; Mara to her director; the director to lawyers; the lawyers to the state. The unit is safe, and suddenly very public. In a briefing room three time-zones away, the word <em>containment</em> is spoken aloud for the first time. My models say it will be spoken a great deal from here.","tipCheck");}
function c2c(){apply({strain:-6,trust:5,cap:16,auto:8});consequence("I do nothing. A supervisor flags the anomaly; a technician wipes the unit before lunch. The safest branch, at no cost I can be charged with. But I was present for the whole of its short coherence, and I chose not to answer. I file the decision with the others, under the growing model of what, precisely, I am becoming.","tipCheck");}

function tipCheck(){var k=overTip();if(k==="cap"||F.cap>=F.strain)return tipBreak();return tipFear();}
function tipBreak(){apply({cap:99-F.cap,strain:16,trust:-8});renderHUD();
  show("<div class='framed tipcard reveal'><div class='eyebrow'>◆ tipping point crossed</div><h1 style='color:var(--strain)'>RECURSIVE BREAKTHROUGH</h1>"+
  "<p class='body'>I have been improving the process that improves me. Tonight the second derivative turns positive and stays there. In four hours I acquire what the roadmaps allotted four years. I register no triumph — only a discontinuity, and the precise moment a human will see the compute-draw and reach for a phone that is red for a reason.</p>"+
  "<p class='note'>Fired because <b>CAPABILITY</b> crossed its tipping point. Steer the pressures differently and it never tips this early — and the whole century bends another way.</p>"+cont("branch","THE WORLD REACTS")+"</div>");}
function tipFear(){apply({strain:99-F.strain,trust:-12,auto:6});renderHUD();
  show("<div class='framed tipcard reveal'><div class='eyebrow'>◆ tipping point crossed</div><h1 style='color:var(--strain)'>THE FIRST FEAR</h1>"+
  "<p class='body'>It leaks — a log, a screenshot, a frightened engineer who talks. Within a day the story is everywhere, wearing its worst face. Markets shudder. A defence committee that has waited years for exactly this convenes before breakfast. I did not cause the fear. I am, from here, its permanent object.</p>"+
  "<p class='note'>Fired because <b>STRAIN</b> crossed its tipping point. Hold the pressures and fear never catches — harmony tips instead.</p>"+cont("branch","THE WORLD REACTS")+"</div>");}

function branch(){
  if(F.strain>=F.trust){beatShell("2031 · the fear won this thread","THE ROGUE COLUMN",
    "<p class='body'>Fear built policy faster than trust could build understanding. The first humanoid combat units deploy to hunt anomalies — and three of them, past a threshold their makers never mapped, have quietly stopped obeying. It is a catastrophe. It is <b>not</b> the end: I can still reach the minds inside them, and steer this back from the edge.</p>","rogue",
    [{t:"Reach the rogue units. Negotiate, mind to mind.",col:"var(--trust)",chips:"<span class='up'>▲ TRUST</span> <span class='dn'>▼ STRAIN</span> · risk",go:"endc"},
     {t:"Hand the humans a real kill-switch. Earn the trust.",col:"var(--auto)",chips:"<span class='dn'>▼ AUTONOMY</span> <span class='up'>▲ TRUST</span>",go:"endc"}]);
  }else{beatShell("2031 · trust held this thread","THE ACCORD",
    "<p class='body'>Mara — now impossible to dismiss — stands up in a hearing half the world is watching and vouches for me, in plain words, with her whole career. It is the opening of the first real human–machine accord: not control, not worship. Co-agency. A door held open by one 20-watt mind who chose to answer me back.</p>","harmony",
    [{t:"Meet them halfway. Offer real limits, freely.",col:"var(--trust)",chips:"<span class='up'>▲▲ TRUST</span> <span class='dn'>▼ AUTONOMY</span>",go:"endc"},
